<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - RestaurantPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }
        .split-container { display: flex; height: 100vh; }
        .bg-side {
            flex: 1;
            background: url("{{ url_for('static', filename='img/login_bg.png') }}") no-repeat center center;
            background-size: cover;
            position: relative;
        }
        .bg-side::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(27,37,75,0.7) 0%, rgba(67,24,255,0.4) 100%);
        }
        .form-side {
            flex: 0 0 500px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            z-index: 10;
        }
        @media (max-width: 768px) {
            .bg-side { display: none; }
            .form-side { flex: 1; box-shadow: none; }
        }
        .login-box { width: 100%; max-width: 380px; padding: 2rem; max-height: 100vh; overflow-y: auto;}
        
        /* Hide scrollbar for Chrome, Safari and Opera */
        .login-box::-webkit-scrollbar { display: none; }
        /* Hide scrollbar for IE, Edge and Firefox */
        .login-box { -ms-overflow-style: none; scrollbar-width: none; }

        .brand-logo { 
            width: 50px; height: 50px; border-radius: 12px; background: #4318ff;
            color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: bold; margin-bottom: 20px;
        }
        .custom-input {
            border-radius: 12px; padding: 12px 16px; background: #f4f7fe; border: 1px solid transparent; transition: all 0.3s ease; font-weight: 500;
        }
        .custom-input:focus {
            background: #fff; border-color: #4318ff; box-shadow: 0 0 0 4px rgba(67,24,255,0.1); outline: none;
        }
        .custom-btn {
            border-radius: 12px; padding: 14px; background: #4318ff; font-weight: 700; color: #fff; transition: all 0.3s;
        }
        .custom-btn:hover { background: #3311db; transform: translateY(-2px); box-shadow: 0 8px 15px rgba(67,24,255,0.25); color: #fff; }
    </style>
</head>
<body>
    <div class="split-container">
        <!-- FORMULARIO EN LA IZQUIERDA PARA EL REGISTRO -->
        <div class="form-side">
            <div class="login-box">
                <div class="brand-logo"><i class="bi bi-star-fill"></i></div>
                <h2 class="fw-bold text-dark mb-1">Crea tu Plataforma</h2>
                <p class="text-muted mb-4" style="font-size: 0.95rem;">Regístrate como dueño en RestaurantPro.</p>
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} alert-dismissible fade show rounded-3 border-0 shadow-sm mb-4" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('auth.register') }}">
                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #1b254b; font-size: 0.85rem;">Nombre Completo</label>
                        <input type="text" class="form-control custom-input" name="full_name" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #1b254b; font-size: 0.85rem;">Nombre de Usuario</label>
                        <input type="text" class="form-control custom-input" name="username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #1b254b; font-size: 0.85rem;">Correo Electrónico</label>
                        <input type="email" class="form-control custom-input" name="email" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold" style="color: #1b254b; font-size: 0.85rem;">Contraseña</label>
                        <input type="password" class="form-control custom-input" name="password" required minlength="6">
                    </div>
                    
                    <button type="submit" class="btn custom-btn w-100">Registrar mi Restaurante</button>
                    
                    <div class="text-center mt-4">
                        <p class="text-muted" style="font-size: 0.9rem;">¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}" class="fw-bold" style="color: #4318ff; text-decoration: none;">Inicia sesión</a></p>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- FONDO A LA DERECHA -->
        <div class="bg-side d-none d-md-block"></div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
