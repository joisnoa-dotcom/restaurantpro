{% extends 'layout.html' %}

{% block title %}Editar Producto - RestaurantPro{% endblock %}
{% block header_title %}Editar Producto{% endblock %}

{% block content %}
<div class="card shadow-sm border-0 mx-auto">
    <div class="card-body p-4">
        <form action="{{ url_for('products.edit', id=product.id) }}" method="POST" enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label fw-bold">Nombre del Producto</label>
                    <input type="text" class="form-control" name="name" value="{{ product.name }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Precio (S/)</label>
                    <input type="number" step="0.01" class="form-control" name="price" value="{{ product.price }}" required>
                </div>
                
                <div class="col-md-6">
                    <label class="form-label fw-bold">Categoría</label>
                    <select class="form-select" name="category_id" required>
                        {% for c in categories %}
                            <option value="{{ c.id }}" {% if c.id == product.category_id %}selected{% endif %}>{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Tiempo de Prep. (Min)</label>
                    <input type="number" class="form-control" name="preparation_time" value="{{ product.preparation_time }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Stock Actual</label>
                    <input type="number" class="form-control" name="stock" value="{{ product.stock }}" min="0">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <div class="form-check form-switch fs-5">
                        <input class="form-check-input" type="checkbox" name="track_stock" id="track_stock" {% if product.track_stock %}checked{% endif %}>
                        <label class="form-check-label fs-6 mt-1" for="track_stock">Controlar Stock</label>
                    </div>
                </div>

                <div class="col-12">
                    <label class="form-label fw-bold">Descripción</label>
                    <textarea class="form-control" name="description" rows="3">{{ product.description }}</textarea>
                </div>

                <div class="col-md-8">
                    <label class="form-label fw-bold">Cambiar Imagen</label>
                    <input type="file" class="form-control" name="image" accept="image/*">
                    <small class="text-muted">Deje en blanco para mantener la imagen actual.</small>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <div class="form-check form-switch fs-5">
                        <input class="form-check-input" type="checkbox" name="is_available" id="is_available" {% if product.is_available %}checked{% endif %}>
                        <label class="form-check-label fs-6 mt-1" for="is_available">Disponible</label>
                    </div>
                </div>
            </div>
            
            <hr class="my-4">
            <div class="d-flex justify-content-end gap-2">
                <a href="{{ url_for('products.index') }}" class="btn btn-light">Cancelar</a>
                <button type="submit" class="btn btn-primary">Actualizar Producto</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
