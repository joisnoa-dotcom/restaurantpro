{% extends 'layout.html' %}

{% block title %}Nuevo Producto - RestaurantPro{% endblock %}
{% block header_title %}Nuevo Producto{% endblock %}

{% block content %}
<div class="card shadow-sm border-0 max-w-800 mx-auto">
    <div class="card-body p-4">
        <form action="{{ url_for('products.create') }}" method="POST" enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label fw-bold">Nombre del Producto</label>
                    <input type="text" class="form-control" name="name" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Precio (S/)</label>
                    <input type="number" step="0.01" class="form-control" name="price" required>
                </div>
                
                <div class="col-md-6">
                    <label class="form-label fw-bold">Categoría</label>
                    <select class="form-select" name="category_id" required>
                        <option value="">Seleccione una categoría...</option>
                        {% for c in categories %}
                            <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Tiempo de Prep. (Min)</label>
                    <input type="number" class="form-control" name="preparation_time" value="15" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Stock Inicial</label>
                    <input type="number" class="form-control" name="stock" value="0" min="0">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <div class="form-check form-switch fs-5">
                        <input class="form-check-input" type="checkbox" name="track_stock" id="track_stock">
                        <label class="form-check-label fs-6 mt-1" for="track_stock">Controlar Stock</label>
                    </div>
                </div>

                <div class="col-12">
                    <label class="form-label fw-bold">Descripción</label>
                    <textarea class="form-control" name="description" rows="3"></textarea>
                </div>

                <div class="col-12">
                    <label class="form-label fw-bold">Imagen del Producto</label>
                    <input type="file" class="form-control" name="image" accept="image/*">
                </div>
            </div>
            
            <hr class="my-4">
            <div class="d-flex justify-content-end gap-2">
                <a href="{{ url_for('products.index') }}" class="btn btn-light">Cancelar</a>
                <button type="submit" class="btn btn-primary">Guardar Producto</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
